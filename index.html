<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WordFlash 🌟 — Вивчай Англійську!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<meta name="theme-color" content="#7C3AED">
<style>
:root {
  --primary: #7C3AED;
  --primary-light: #A78BFA;
  --success: #10B981;
  --danger: #EF4444;
  --text: #1F2937;
  --text-light: #6B7280;
  --text-muted: #9CA3AF;
  --radius: 20px;
  --radius-sm: 12px;
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  min-height:100vh;
  font-family:'Nunito','Segoe UI',sans-serif;
  background:linear-gradient(-45deg,#667eea,#764ba2,#f64f59,#c471ed,#12c2e9);
  background-size:400% 400%;
  animation:bgShift 18s ease infinite;
  padding:16px 16px 40px;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
@keyframes bgShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
#app{max-width:560px;margin:0 auto}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
#toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:8888;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:#1F2937;color:white;padding:12px 24px;border-radius:50px;font-weight:700;font-size:15px;animation:toastIn .3s ease,toastOut .3s ease 2.5s forwards;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(10px)}}
.card{background:rgba(255,255,255,.97);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:28px;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.app-logo{text-align:center;margin-bottom:28px;animation:bounceIn .6s cubic-bezier(.68,-.55,.265,1.55)}
.app-logo .logo-icon{font-size:56px;display:block;margin-bottom:4px}
.app-logo h1{font-size:32px;font-weight:900;background:linear-gradient(135deg,#7C3AED,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.app-logo p{color:var(--text-light);font-size:15px;font-weight:600;margin-top:4px}
@keyframes bounceIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);border:none;border-radius:50px;color:white;font-family:inherit;font-weight:700;font-size:15px;padding:8px 16px;cursor:pointer;margin-bottom:16px;transition:background .2s}
.back-btn:hover{background:rgba(255,255,255,.3)}
.section-title{font-size:22px;font-weight:900;color:var(--text);margin-bottom:20px}
/* Profiles */
.profiles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.profile-card{background:white;border-radius:var(--radius);padding:24px 16px;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 16px rgba(0,0,0,.1);position:relative;overflow:hidden;border:3px solid transparent}
.profile-card:hover{transform:translateY(-6px);box-shadow:0 14px 30px rgba(0,0,0,.15)}
.profile-card .profile-avatar{font-size:48px;margin-bottom:10px;display:block}
.profile-card .profile-name{font-weight:800;font-size:16px;color:var(--text);margin-bottom:4px}
.profile-card .profile-meta{font-size:12px;color:var(--text-muted);font-weight:600}
.profile-card .profile-delete{position:absolute;top:8px;right:8px;background:none;border:none;font-size:16px;cursor:pointer;opacity:0;transition:opacity .2s;line-height:1;padding:2px}
.profile-card:hover .profile-delete{opacity:.5}
.profile-card .profile-delete:hover{opacity:1 !important}
.profile-card-new{border:3px dashed #D1D5DB;background:#F9FAFB;color:var(--text-light);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:140px}
.profile-card-new .plus-icon{font-size:36px}
.profile-card-new .new-label{font-weight:700;font-size:14px}
.profile-card-new:hover{border-color:var(--primary);color:var(--primary)}
/* New profile */
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:20px}
.avatar-option{font-size:28px;padding:8px;border-radius:12px;border:3px solid transparent;cursor:pointer;text-align:center;transition:transform .15s,border-color .15s;background:#F3F4F6;line-height:1}
.avatar-option:hover{transform:scale(1.15)}
.avatar-option.selected{border-color:var(--primary);background:#EDE9FE}
.color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:20px}
.color-option{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s,box-shadow .15s}
.color-option:hover{transform:scale(1.15)}
.color-option.selected{border-color:white;box-shadow:0 0 0 3px var(--primary)}
/* Menu */
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:20px;border-bottom:2px solid #F3F4F6}
.profile-header .ph-avatar{font-size:52px}
.profile-header .ph-info{flex:1}
.profile-header .ph-name{font-size:22px;font-weight:900;color:var(--text)}
.profile-header .ph-level{font-size:13px;font-weight:700;color:var(--text-light);margin-top:2px}
.xp-bar{height:8px;background:#E5E7EB;border-radius:4px;overflow:hidden;margin-top:6px}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,#7C3AED,#EC4899);border-radius:4px;transition:width .6s ease}
.streak-badge{display:flex;flex-direction:column;align-items:center;background:linear-gradient(135deg,#FF6B6B,#FF8E53);border-radius:16px;padding:10px 14px;min-width:64px;color:white;box-shadow:0 4px 12px rgba(255,107,107,.4)}
.streak-badge .s-icon{font-size:22px}
.streak-badge .s-num{font-size:20px;font-weight:900;line-height:1}
.streak-badge .s-label{font-size:11px;font-weight:700}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.menu-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:white;border:2px solid #F3F4F6;border-radius:var(--radius);padding:20px;cursor:pointer;font-family:inherit;transition:transform .2s,box-shadow .2s,border-color .2s;color:var(--text)}
.menu-btn:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.1);border-color:var(--primary-light)}
.menu-btn .mb-icon{font-size:36px}
.menu-btn .mb-label{font-size:14px;font-weight:800;color:var(--text)}
.menu-btn .mb-sub{font-size:12px;color:var(--text-muted);font-weight:600}
.menu-btn.primary-btn{background:linear-gradient(135deg,#7C3AED,#A78BFA);border-color:transparent;color:white;grid-column:1/-1;padding:24px;box-shadow:0 6px 20px rgba(124,58,237,.4)}
.menu-btn.primary-btn .mb-label{color:white;font-size:18px}
.menu-btn.primary-btn .mb-sub{color:rgba(255,255,255,.8)}
.menu-btn.primary-btn:hover{box-shadow:0 12px 30px rgba(124,58,237,.5)}
/* Dictionary */
.dict-toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-input{flex:1;min-width:140px;padding:10px 16px;border:2px solid #E5E7EB;border-radius:50px;font-family:inherit;font-size:14px;font-weight:600;outline:none;transition:border-color .2s;background:#F9FAFB}
.search-input:focus{border-color:var(--primary);background:white}
.dict-stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.dict-stat{background:#F3F4F6;border-radius:12px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--text-light)}
.word-list{display:flex;flex-direction:column;gap:8px;max-height:55vh;overflow-y:auto;padding-right:4px}
.word-list::-webkit-scrollbar{width:4px}
.word-list::-webkit-scrollbar-track{background:#F3F4F6;border-radius:2px}
.word-list::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:2px}
.word-item{display:flex;align-items:center;gap:10px;background:#F9FAFB;border-radius:14px;padding:12px 14px;border:2px solid transparent;transition:border-color .2s,background .2s;cursor:pointer}
.word-item:hover{background:#F3F4F6}
.word-item.selected{border-color:var(--primary);background:#EDE9FE}
.word-item-check{width:22px;height:22px;border-radius:6px;border:2px solid #D1D5DB;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:border-color .2s,background .2s;background:white}
.word-item.selected .word-item-check{background:var(--primary);border-color:var(--primary);color:white}
.word-item-text{flex:1}
.word-en{font-weight:800;font-size:15px;color:var(--text)}
.word-ua{font-weight:600;font-size:13px;color:var(--text-light);margin-top:1px}
.word-difficulty{font-size:11px;font-weight:700;padding:3px 8px;border-radius:50px}
.diff-new{background:#E0F2FE;color:#0369A1}
.diff-easy{background:#DCFCE7;color:#15803D}
.diff-medium{background:#FEF9C3;color:#A16207}
.diff-hard{background:#FEE2E2;color:#B91C1C}
.word-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;border-radius:8px;line-height:1;transition:background .2s;opacity:.6}
.icon-btn:hover{background:rgba(0,0,0,.08);opacity:1}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state .empty-icon{font-size:56px;margin-bottom:12px}
.empty-state p{font-weight:700;font-size:16px}
.dict-footer{margin-top:16px;padding-top:16px;border-top:2px solid #F3F4F6;display:flex;gap:10px;flex-wrap:wrap}
/* Forms */
.form-group{margin-bottom:16px}
.form-label{display:block;font-weight:800;font-size:14px;color:var(--text);margin-bottom:6px}
.form-input{width:100%;padding:12px 16px;border:2px solid #E5E7EB;border-radius:14px;font-family:inherit;font-size:16px;font-weight:600;outline:none;transition:border-color .2s;color:var(--text)}
.form-input:focus{border-color:var(--primary)}
/* Study setup */
.direction-choice{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.dir-btn{padding:16px;border:3px solid #E5E7EB;border-radius:var(--radius-sm);background:white;cursor:pointer;font-family:inherit;text-align:center;transition:border-color .2s,background .2s,transform .15s}
.dir-btn:hover{border-color:var(--primary-light);transform:scale(1.02)}
.dir-btn.selected{border-color:var(--primary);background:#EDE9FE}
.dir-btn .dir-icon{font-size:28px;margin-bottom:6px}
.dir-btn .dir-label{font-size:13px;font-weight:800;color:var(--text)}
.dir-btn .dir-sub{font-size:11px;color:var(--text-muted);font-weight:600}
.word-count-info{background:#F3F4F6;border-radius:var(--radius-sm);padding:16px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.wci-icon{font-size:28px}
.wci-text .wci-num{font-size:20px;font-weight:900;color:var(--primary)}
.wci-text .wci-label{font-size:13px;font-weight:600;color:var(--text-light)}
/* Study */
.study-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.study-info{text-align:center}
.study-count{font-size:16px;font-weight:800;color:var(--text)}
.study-remaining{font-size:12px;font-weight:600;color:var(--text-muted)}
.progress-bar{height:10px;background:#E5E7EB;border-radius:5px;overflow:hidden;margin-bottom:24px}
.progress-fill{height:100%;background:linear-gradient(90deg,#7C3AED,#EC4899);border-radius:5px;transition:width .5s ease}
/* Flashcard */
.flashcard-wrap{perspective:1200px;height:260px;margin-bottom:24px;cursor:pointer}
.flashcard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.flashcard.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;box-shadow:var(--shadow-lg)}
.fc-front{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
.fc-back{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);color:white;transform:rotateY(180deg)}
.fc-lang-tag{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;opacity:.7;margin-bottom:16px}
.fc-word{font-size:36px;font-weight:900;line-height:1.2;word-break:break-word}
.fc-tip{font-size:12px;opacity:.7;margin-top:12px;font-weight:600}
.speak-btn{background:rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.6);border-radius:50px;font-size:17px;font-weight:800;padding:8px 22px;cursor:pointer;margin-top:12px;transition:background .15s,transform .1s;backdrop-filter:blur(4px);color:white;font-family:inherit;letter-spacing:.3px}
.speak-btn:active{transform:scale(.92);background:rgba(255,255,255,.5)}
/* Study buttons */
.study-btns{display:flex;flex-direction:column;gap:10px}
.study-btns-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.mode-btn{background:rgba(255,255,255,.6);border:2px solid #E5E7EB;border-radius:var(--radius-sm);padding:14px 10px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;text-align:center;line-height:1.3}
.mode-btn.active{background:linear-gradient(135deg,#7C3AED,#4F46E5);color:white;border-color:transparent;box-shadow:0 4px 12px rgba(124,58,237,.4)}
.mode-btn small{display:block;font-size:11px;font-weight:600;opacity:.8;margin-top:3px}
#tetris-canvas,#mario-canvas{touch-action:none;display:block;margin:0 auto}
.study-btn{padding:16px;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.study-btn:hover{transform:translateY(-2px)}
.study-btn:active{transform:translateY(0)}
.btn-know{background:linear-gradient(135deg,#10B981,#059669);color:white;box-shadow:0 4px 16px rgba(16,185,129,.4)}
.btn-know:hover{box-shadow:0 8px 24px rgba(16,185,129,.5)}
.btn-unknown{background:linear-gradient(135deg,#EF4444,#DC2626);color:white;box-shadow:0 4px 16px rgba(239,68,68,.4)}
.btn-unknown:hover{box-shadow:0 8px 24px rgba(239,68,68,.5)}
.btn-flip{background:linear-gradient(135deg,#F59E0B,#D97706);color:white;box-shadow:0 4px 16px rgba(245,158,11,.4);width:100%}
.btn-flip:hover{box-shadow:0 8px 24px rgba(245,158,11,.5)}
.btn-list2{background:linear-gradient(135deg,#6366F1,#4F46E5);color:white;box-shadow:0 4px 16px rgba(99,102,241,.4);width:100%}
.btn-list2:hover{box-shadow:0 8px 24px rgba(99,102,241,.5)}
.btn-list2.active{background:linear-gradient(135deg,#10B981,#059669);box-shadow:0 4px 16px rgba(16,185,129,.4)}
.btn-list2.active:hover{box-shadow:0 8px 24px rgba(16,185,129,.5)}
.btn-quit{background:none;border:2px solid #E5E7EB;color:var(--text-light);font-size:13px;width:100%;padding:10px}
.btn-quit:hover{background:#F3F4F6}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.card-shake{animation:shake .4s ease}
@keyframes successPulse{0%{transform:scale(1)}30%{transform:scale(1.04)}100%{transform:scale(1)}}
.card-success{animation:successPulse .3s ease}
/* Complete */
.complete-hero{text-align:center;padding:12px 0 24px}
.complete-emoji{font-size:72px;display:block;animation:heroEntrance .6s cubic-bezier(.68,-.55,.265,1.55);margin-bottom:8px}
@keyframes heroEntrance{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
.complete-title{font-size:26px;font-weight:900;color:var(--text);margin-bottom:4px}
.complete-subtitle{font-size:15px;color:var(--text-light);font-weight:600}
.stars{display:flex;justify-content:center;gap:8px;margin:20px 0}
.star{font-size:48px;animation:starPop .4s cubic-bezier(.68,-.55,.265,1.55) both;filter:grayscale(1);opacity:.3}
.star.lit{filter:grayscale(0);opacity:1;animation:starPop .4s cubic-bezier(.68,-.55,.265,1.55) both,starShine 2s ease infinite .5s}
.star:nth-child(1){animation-delay:.2s}
.star:nth-child(2){animation-delay:.4s}
.star:nth-child(3){animation-delay:.6s}
@keyframes starPop{from{transform:scale(0) rotate(-30deg)}to{transform:scale(1) rotate(0deg)}}
@keyframes starShine{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.result-item{background:#F9FAFB;border-radius:14px;padding:14px 10px;text-align:center}
.result-item .ri-num{font-size:24px;font-weight:900;color:var(--primary)}
.result-item .ri-label{font-size:11px;font-weight:700;color:var(--text-muted);margin-top:2px}
.xp-gained{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#7C3AED,#EC4899);color:white;border-radius:50px;padding:8px 20px;font-size:15px;font-weight:800;margin-bottom:20px;animation:xpPulse .5s ease .8s both}
@keyframes xpPulse{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.achievements-earned{background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border:2px solid #FDE68A;border-radius:var(--radius-sm);padding:14px;margin-bottom:16px}
.achievements-earned h4{font-size:13px;font-weight:800;color:#92400E;margin-bottom:10px}
.achievement-badge{display:flex;align-items:center;gap:10px;padding:8px 0}
.achievement-badge .ab-icon{font-size:28px}
.achievement-badge .ab-info .ab-name{font-weight:800;font-size:14px;color:var(--text)}
.achievement-badge .ab-info .ab-desc{font-size:12px;color:var(--text-muted);font-weight:600}
/* Stats */
.stats-hero{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.stat-box{background:#F9FAFB;border-radius:var(--radius-sm);padding:16px;text-align:center}
.stat-box .sb-num{font-size:28px;font-weight:900;color:var(--primary)}
.stat-box .sb-label{font-size:12px;font-weight:700;color:var(--text-muted);margin-top:4px}
.stat-box .sb-icon{font-size:22px;margin-bottom:4px}
.stats-section-title{font-size:16px;font-weight:800;color:var(--text);margin:20px 0 12px}
.sessions-list{display:flex;flex-direction:column;gap:8px}
.session-item{display:flex;align-items:center;gap:12px;background:#F9FAFB;border-radius:14px;padding:12px 14px}
.session-icon{font-size:24px}
.session-info{flex:1}
.session-date{font-size:13px;font-weight:700;color:var(--text)}
.session-meta{font-size:12px;color:var(--text-muted);font-weight:600}
.session-score{font-size:14px;font-weight:900;color:var(--primary)}
/* Achievements */
.achievements-grid{display:flex;flex-direction:column;gap:10px}
.ach-card{background:#F9FAFB;border-radius:14px;padding:14px;display:flex;align-items:center;gap:14px;border:2px solid transparent;transition:transform .15s}
.ach-card.earned{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border-color:#FDE68A;box-shadow:0 4px 16px rgba(245,158,11,.15)}
.ach-card.locked{opacity:.5;filter:grayscale(.7)}
.ach-icon{font-size:36px;flex-shrink:0;width:48px;text-align:center}
.ach-name{font-size:14px;font-weight:800;color:var(--text)}
.ach-desc{font-size:12px;color:var(--text-muted);font-weight:600}
.ach-reward{display:inline-block;background:linear-gradient(135deg,#DCFCE7,#BBF7D0);border-radius:8px;padding:5px 10px;font-size:13px;font-weight:800;color:#15803D;margin-top:5px}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border:none;border-radius:50px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s,opacity .2s;text-decoration:none}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none !important}
.btn-primary{background:linear-gradient(135deg,#7C3AED,#A78BFA);color:white;box-shadow:0 4px 16px rgba(124,58,237,.35)}
.btn-primary:hover{box-shadow:0 8px 24px rgba(124,58,237,.5)}
.btn-success{background:linear-gradient(135deg,#10B981,#059669);color:white;box-shadow:0 4px 16px rgba(16,185,129,.35)}
.btn-outline{background:white;border:2px solid #E5E7EB;color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}

    radial-gradient(ellipse 130px 52px at 67% 13%,rgba(255,255,255,.93) 99%,transparent 100%),
    radial-gradient(ellipse 72px 29px at 44% 32%,rgba(255,255,255,.88) 99%,transparent 100%),

.mc-deco-item{position:absolute;animation:floatBob ease-in-out infinite;font-size:26px;filter:drop-shadow(1px 3px 5px rgba(0,0,0,.4))}
@keyframes floatBob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-16px) rotate(4deg)}}
/* Running character */
.kid-runner{display:none;position:fixed;bottom:14px;left:-90px;z-index:500;pointer-events:none;filter:drop-shadow(2px 6px 10px rgba(0,0,0,.6))}

.kid-runner .mc-lleg{transform-origin:6.5px 16px;animation:legSwL .32s ease-in-out infinite alternate}

.kid-runner .mc-rarm{transform-origin:12px 8px;animation:legSwL .32s ease-in-out infinite alternate}

.cat-btn:hover{border-color:var(--primary-light)}
.cat-count{border-radius:50px;padding:2px 8px;font-size:12px;font-weight:800}
.cat-btn.cat-learning.active{border-color:#3B82F6;background:#EFF6FF;color:#1D4ED8}
.cat-btn.cat-hard.active{border-color:#EF4444;background:#FEF2F2;color:#B91C1C}

.boss-bar{background:rgba(0,0,0,.75);border:2px solid #c83030;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;flex-direction:column;gap:6px}

.boss-emoji{font-size:36px;filter:drop-shadow(0 0 8px rgba(255,60,60,.8))}

@keyframes bossHit{0%,100%{transform:translateX(0) scale(1)}25%{transform:translateX(-6px) scale(0.98)}75%{transform:translateX(6px) scale(0.98)}}
.boss-hit{animation:bossHit .3s ease}
/* Minecraft toast */
body.child-theme .toast{background:#3d1f00;color:#ffe88a;border:2px solid #c8a020;border-radius:4px;box-shadow:4px 4px 0 rgba(0,0,0,.7)}
/* MC Achievement popup */
.mc-achievement-popup{position:fixed;top:20px;right:16px;z-index:9997;background:#3d1f00;border:3px solid #c8a020;border-radius:4px;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:4px 4px 0 rgba(0,0,0,.7);min-width:220px;max-width:280px;animation:mcAchIn .5s cubic-bezier(.68,-.55,.265,1.55) both}

.mob-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:16px}

const GH = {
  token(){ return localStorage.getItem('wf_gh_token') || _GH_T.trim(); },
  setToken(t){ localStorage.setItem('wf_gh_token', t.trim()); },
  clearToken(){ localStorage.removeItem('wf_gh_token'); },
  getSha(){ return localStorage.getItem('wf_gh_sha') || null; },
  setSha(s){ if(s) localStorage.setItem('wf_gh_sha', s); },
  rawUrl(){ return `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_DATA_BRANCH}/${GH_DATA_PATH}?t=${Date.now()}`; },
  apiUrl(){ return `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_DATA_PATH}`; },
  apiGetUrl(){ return `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_DATA_PATH}?ref=${GH_DATA_BRANCH}`; },
  headers(){
    const h = {
      'Accept': 'application/vnd.github.v3+json',
      'X-GitHub-Api-Version': '2022-11-28',
    };
    const t = this.token();
    if(t) h['Authorization'] = `Bearer ${t}`;
    return h;
  },
  async pull(){
    try{
      const r = await fetch(this.rawUrl());
      if(!r.ok) return null;
      return await r.json();
    }catch{ return null; }
  },
  async push(keepalive=false){
    const token = this.token();
    if(!token) return false;
    S.syncStatus = 'syncing'; updateSyncBadge();
    const json = JSON.stringify(S.profiles, null, 2);
    const bytes = new TextEncoder().encode(json);
    const content = btoa(Array.from(bytes).map(b=>String.fromCharCode(b)).join(''));
    // Get current SHA — repo is public, no auth needed for GET
    let sha = this.getSha();
    if(!sha){
      try{
        const r = await fetch(this.apiGetUrl());
        if(r.ok){ const d = await r.json(); sha = d.sha; this.setSha(sha); }
      }catch{}
    }
    try{
      const body = {message:`WordFlash sync ${new Date().toISOString().slice(0,10)}`, content, branch:GH_DATA_BRANCH};
      if(sha) body.sha = sha;
      const opts = {method:'PUT', headers:{...this.headers(),'Content-Type':'application/json'}, body:JSON.stringify(body)};
      if(keepalive) opts.keepalive = true;
      const r = await fetch(this.apiUrl(), opts);
      if(r.ok){
        const d = await r.json();
        this.setSha(d.content.sha);
        S.syncStatus = 'ok'; updateSyncBadge();
        return true;
      }
      // SHA conflict — clear cache and retry once
      if(r.status === 409 || r.status === 422){
        this.setSha(null);
        localStorage.removeItem('wf_gh_sha');
        const r2 = await fetch(this.apiGetUrl()); // public repo — no auth for GET
        if(r2.ok){ const d2 = await r2.json(); body.sha = d2.sha; this.setSha(d2.sha); }
        const r3 = await fetch(this.apiUrl(), {method:'PUT', headers:{...this.headers(),'Content-Type':'application/json'}, body:JSON.stringify(body)});
        if(r3.ok){ const d3 = await r3.json(); this.setSha(d3.content.sha); S.syncStatus='ok'; updateSyncBadge(); return true; }
      }
      const errText = await r.text().catch(()=>'');
      console.error('GH push failed:', r.status, errText);
      S.syncStatus = 'error'; updateSyncBadge();
      S._lastPushError = r.status;
      return false;
    }catch(e){
      console.error('GH push exception:', e);
      S.syncStatus='error'; updateSyncBadge(); return false;
    }
  },
};

let _syncTimer = null;
function schedulePush(){
  if(!GH.token()) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(async()=>{
    const ok = await GH.push();
    if(!ok) showToast(`⚠️ Помилка синхронізації (${S._lastPushError||'?'})`);
  }, 1500);
}

function addXP(p,n){
  const prev=getLevel(p.xp);
  const gain=Math.round(n*getLevelMult(prev));
  p.xp=(p.xp||0)+gain;
  const newLvl=getLevel(p.xp);
  if(newLvl>prev){
    const perk=getLevelPerk(newLvl);
    showToast(perk?`🎉 Рівень ${newLvl}! ${perk}`:`🎉 Рівень ${newLvl}! ${getLevelTitle(newLvl)}`,4000);
  }
}
function updateStreak(p){
  const t=today();
  if(!p.lastStudied){ p.streak=1; }
  else if(p.lastStudied===t){ return; }
  else{ const d=Math.round((new Date(t)-new Date(p.lastStudied))/86400000); p.streak=d===1?p.streak+1:1; }
  p.bestStreak=Math.max(p.bestStreak||0,p.streak); p.lastStudied=t;
}
function checkAchievements(p){
  const earned=[]; const give=id=>{ if(!p.achievements.includes(id)){p.achievements.push(id);earned.push(id);} };
  const wc=p.words.length, sc=p.sessions.length;
  const perfects=p.sessions.filter(s=>s.knownFirst===s.totalWords&&s.totalWords>=5).length;
  if(wc>=1)   give('first_word');
  if(wc>=10)  give('words_10');  if(wc>=25)  give('words_25');
  if(wc>=50)  give('words_50');  if(wc>=100) give('words_100');
  if(sc>=1)   give('first_session'); if(sc>=3)  give('sessions_3');
  if(sc>=5)   give('sessions_5');    if(sc>=10) give('sessions_10');
  if(sc>=20)  give('sessions_20');   if(sc>=30) give('sessions_30');
  if(p.streak>=3)  give('streak_3'); if(p.streak>=7)  give('streak_7'); if(p.streak>=30) give('streak_30');
  if(perfects>=1)  give('perfect');  if(perfects>=3)  give('perfect_3');
  return earned;
}

// ── WORD OPS ──
function getCategory(w){
  if(!w.category){
    if(w.isHard) return 'hard';
    const t=(w.timesKnown||0)+(w.timesUnknown||0);
    return (t>=5&&(w.timesKnown||0)/t>=0.8)?'easy':'learning';
  }
  return w.category;
}
function migrateWordCategories(words){
  (words||[]).forEach(w=>{
    if(!w.category){
      if(w.isHard){ w.category='hard'; w.streak=w.hardConsecutiveCorrect||0; }
      else{ const t=(w.timesKnown||0)+(w.timesUnknown||0); w.category=(t>=5&&(w.timesKnown||0)/t>=0.8)?'easy':'learning'; w.streak=0; }
    }
    if(w.streak===undefined) w.streak=0;
  });
}
function getDifficulty(w){
  const cat=getCategory(w); if(cat==='hard') return 'hard'; if(cat==='easy') return 'easy';
  const t=(w.timesKnown||0)+(w.timesUnknown||0); if(t===0) return 'new';
  const r=w.timesKnown/t; return r>=.8?'easy':r>=.5?'medium':'hard';
}
function diffBadge(w){
  const cat=getCategory(w), streak=w.streak||0;
  if(cat==='hard') return `<span class="word-difficulty diff-hard">🔥 ${streak}/3</span>`;
  if(cat==='easy') return `<span class="word-difficulty diff-easy">😊 Легке</span>`;
  return `<span class="word-difficulty diff-new">📖 ${streak}/5</span>`;
}

  const boss=isKid()?pick(BOSSES):null;
  S.session={allWords:words,queue:shuffle([...words]),completed:[],direction:dir||'en-ua',isFlipped:false,startTime:Date.now(),knownFirst:0,attempts:{},boss,bossHp:boss?boss.hp:0};
  go('study');
}
const currentCard = ()=> S.session&&S.session.queue.length>0 ? S.session.queue[0] : null;

function actionKnow(){
  const s=S.session, w=currentCard(); if(!w) return;
  w.timesStudied++; w.timesKnown++; s.completed.push(w);
  if(!s.attempts[w.id]) s.knownFirst++;
  // Combo
  s.combo=(s.combo||0)+1;
  if(isKid()&&s.combo>=3){ showCombo(s.combo); addXP(getProfile(),s.combo); }
  // Boss
  if(s.boss){
    s.bossHp=Math.round(s.boss.hp*(1-s.completed.length/s.allWords.length));
    const fill=document.querySelector('.boss-hp-fill'); if(fill) fill.style.width=Math.max(0,s.bossHp/s.boss.hp*100)+'%';
    const txt=document.querySelector('.boss-hp-text'); if(txt) txt.textContent=`❤️ ${s.bossHp}/${s.boss.hp}`;
    const bar=document.querySelector('.boss-bar');
    if(bar){
      bar.classList.add('boss-hit'); setTimeout(()=>bar&&bar.classList.remove('boss-hit'),300);
      const pct=s.bossHp/s.boss.hp;
      bar.classList.toggle('boss-shaking',pct<0.3&&s.bossHp>0);
      showBossSpeech(pct<0.25?pick(BOSS_LOW_HP_PHRASES):pick(BOSS_HIT_PHRASES));

  }

  if(isKid()){
    const wrap=document.querySelector('.flashcard-wrap');

  }
  addXP(getProfile(),5); saveData(); saveSession();
  s.queue.shift(); s.isFlipped=false;
  const wrap=document.querySelector('.flashcard-wrap');
  if(wrap){ wrap.classList.add('card-success'); setTimeout(()=>wrap&&wrap.classList.remove('card-success'),300); }
  s.queue.length===0 ? finishSession() : updateStudyCard();
}
function actionUnknown(){
  const s=S.session, w=currentCard(); if(!w) return;
  w.timesStudied++; w.timesUnknown++;
  const attempts=(s.attempts[w.id]=(s.attempts[w.id]||0)+1);
  // 2 помилки в занятті → переводимо в Складні
  if(attempts===2 && getCategory(w)!=='hard'){
    w.category='hard'; w.streak=0;
    showToast(`🔥 "${w.english}" — переходить до складних!`);
  }

  s.combo=0;
  if(isKid()){
    const wrap=document.querySelector('.flashcard-wrap');
    if(wrap){ const r=wrap.getBoundingClientRect(); showFloatReaction(pick(['😂','💀','🤣','😵','🙈']),r.left+r.width/2-20,r.top+r.height/3); }
  }

  }

  const minPos=Math.min(2, s.queue.length);
  const insertAt=minPos+Math.floor(Math.random()*(s.queue.length-minPos+1));

function updateStudyCard(){
  const s=S.session, w=currentCard(); if(!w) return;
  const done=s.completed.length, total=s.allWords.length;
  const pct=Math.round(done/total*100);
  const pc=document.querySelector('.study-count'); if(pc) pc.textContent=`✅ ${done} / ${total} пройдено`;
  const pp=document.querySelector('.study-pct'); if(pp) pp.textContent=pct+'%';
  const pb=document.querySelector('.progress-fill'); if(pb) pb.style.width=pct+'%';
  const pr=document.querySelector('.study-remaining'); if(pr&&!s.boss) pr.textContent=`🔄 В черзі: ${s.queue.length}`;
  const bwl=document.querySelector('.boss-words-left'); if(bwl) bwl.textContent=s.queue.length;
  // Миттєво скидаємо картку без анімації (щоб не мелькав попередній текст)
  const fc=document.querySelector('.flashcard');
  if(fc){ fc.style.transition='none'; fc.classList.remove('flipped'); fc.getBoundingClientRect(); fc.style.transition=''; }
  // Оновлюємо текст вже після скидання
  const front=document.querySelector('.fc-front .fc-word'), back=document.querySelector('.fc-back .fc-word');
  const ftag=document.querySelector('.fc-front .fc-lang-tag'), btag=document.querySelector('.fc-back .fc-lang-tag');
  if(s.direction==='en-ua'){
    if(front) front.textContent=w.english; if(back) back.textContent=w.ukrainian;
    const fLbl2=isPl()?'🇵🇱 Polski':'🇬🇧 English';
    if(ftag) ftag.textContent=fLbl2; if(btag) btag.textContent='🇺🇦 Українська';
  } else {
    if(front) front.textContent=w.ukrainian; if(back) back.textContent=w.english;
    const fLbl3=isPl()?'🇵🇱 Polski':'🇬🇧 English';
    if(ftag) ftag.textContent='🇺🇦 Українська'; if(btag) btag.textContent=fLbl3;

  // Відновити кнопку мікрофону якщо показувалась самоперевірка
  if(S.speechMode){
    const btns=document.querySelector('.study-btns');
    const wn=currentCard();

      btns.innerHTML=`<button class="study-btn" id="rec-btn" data-action="startRecognition" style="background:linear-gradient(135deg,#6366F1,#4F46E5);color:white;box-shadow:0 4px 16px rgba(99,102,241,.4);width:100%;font-size:18px;padding:18px 14px">🎤 Натисни і скажи переклад</button><button class="study-btn btn-unknown" data-action="unknown" style="font-size:13px;padding:10px;opacity:.65">⏭ Пропустити</button><button class="study-btn btn-list2 ${wn.listed?'active':''}" id="list2-btn" data-action="toggleList2">${wn.listed?'✅ В Список 2':'📋 До Списку 2'}</button><button class="study-btn btn-quit" data-action="quitStudy">⏹ Завершити заняття</button>`;

}
function finishSession(){
  const s=S.session, p=getProfile(); if(!s||!p) return;
  clearSavedSession();
  S.session=null;
  const session={id:uid(),date:today(),direction:s.direction,totalWords:s.allWords.length,knownFirst:s.knownFirst,duration:Math.round((Date.now()-s.startTime)/1000)};
  p.sessions.push(session); updateStreak(p); const newAch=checkAchievements(p); addXP(p,25);
  const graduated=[];
  for(const w of s.allWords){
    const cat=getCategory(w);
    if(s.attempts[w.id]){
      // Була хоча б одна помилка — скидаємо серію
      w.streak=0;
    } else {
      // Відповів з першого разу — збільшуємо серію
      w.streak=(w.streak||0)+1;
      if(cat==='hard' && w.streak>=3){
        w.category='learning'; w.streak=0;
        graduated.push({word:w.english,to:'learning'});
      } else if(cat==='learning' && w.streak>=5){
        w.category='easy'; w.streak=0;
        graduated.push({word:w.english,to:'easy'});
      }
    }
  }
  saveData();
  const bossDefeated=!!(s.boss&&s.bossHp===0);
  if(isKid()){ newAch.forEach((id,i)=>{ const a=ACHIEVEMENTS.find(x=>x.id===id); if(a) setTimeout(()=>showMcAchievement(a.icon,a.name,a.reward),800+i*1200); }); }
  S.params={session,newAch,graduated,bossDefeated,boss:s.boss}; go('complete');
}

function achVal(p,id){
  const wc=p.words.length, sc=p.sessions.length, streak=p.streak||0;
  const perfects=p.sessions.filter(s=>s.knownFirst===s.totalWords&&s.totalWords>=5).length;
  if(id==='first_word')    return {cur:Math.min(wc,1),max:1};
  if(id==='first_session') return {cur:Math.min(sc,1),max:1};
  if(id==='perfect')       return {cur:Math.min(perfects,1),max:1};
  if(id==='perfect_3')     return {cur:perfects,max:3};
  const m=id.match(/^(\w+)_(\d+)$/); if(!m) return null;
  const req=parseInt(m[2]);
  if(m[1]==='words')    return {cur:wc,max:req};
  if(m[1]==='sessions') return {cur:sc,max:req};
  if(m[1]==='streak')   return {cur:streak,max:req};
  return null;
}
function nextAchProgress(p){
  return ACHIEVEMENTS
    .filter(a=>!p.achievements.includes(a.id))
    .map(a=>{ const v=achVal(p,a.id); if(!v) return null; return {...a,...v,pct:Math.min(99,Math.floor(v.cur/v.max*100))}; })
    .filter(Boolean)
    .sort((a,b)=>b.pct-a.pct)[0]||null;
}

function getTotalKnown(p){ return (p.sessions||[]).reduce((sum,s)=>sum+(s.knownFirst||0),0); }
function saveGameTime(gameId,secs){
  const p=getProfile();if(!p||secs<=0)return;
  const prev=typeof p.gameTime==='number'?p.gameTime:Object.values(p.gameTime||{}).reduce((a,b)=>a+b,0);
  p.gameTime=prev+Math.round(secs);
  saveData();
}
const GAME_REWARDS=[
  {id:'tetris',name:'🟦 Тетріс',  icon:'🟦',threshold:50, minutes:180,color:'#4F46E5',desc:'50 правильних відповідей'},
  {id:'mario', name:'🍄 Маріо',    icon:'🍄',threshold:120,minutes:180,color:'#DC2626',desc:'120 правильних відповідей'},
  {id:'tanks', name:'🪖 Танки',    icon:'🪖',threshold:200,minutes:180,color:'#166534',desc:'200 правильних відповідей'},
  {id:'cars',  name:'🏎 Машинки', icon:'🏎', threshold:300,minutes:180,color:'#1D4ED8',desc:'300 правильних відповідей'},
];

function viewGames(){
  const p=getProfile(); if(!p){go('profiles');return '';}
  const total=getTotalKnown(p);
  const granted=Math.floor(total/50)*180;
  const used=typeof p.gameTime==='number'?p.gameTime:Object.values(p.gameTime||{}).reduce((a,b)=>a+b,0);
  const avail=Math.max(0,granted-used);
  const mm=Math.floor(avail/60),ss=avail%60;
  const timeStr=mm>0?(ss>0?`${mm} хв ${ss} сек`:`${mm} хв`):`${ss} сек`;
  const needForNext=50-total%50;
  return `
  <button class="back-btn" data-action="back">← Меню</button>
  <div class="card">
    <div class="section-title">🎮 Бонусні ігри</div>
    <div style="font-size:13px;color:var(--text-muted);font-weight:700;margin-bottom:4px">Всього правильних відповідей: <strong style="color:var(--primary)">${total}</strong></div>
    <div style="font-size:14px;font-weight:800;margin-bottom:16px;padding:10px 14px;border-radius:12px;background:${avail>0?'#F0FDF4':'#FFFBEB'};border:2px solid ${avail>0?'#86EFAC':'#FCD34D'}">
      ⏱ Спільний час: <strong style="color:${avail>0?'#15803D':'#92400E'}">${avail>0?timeStr:'0 сек'}</strong>
      ${avail===0&&total>=50?`<span style="color:var(--text-muted);font-size:12px;font-weight:600"> · ще ${needForNext} правильних</span>`:''}
    </div>
    ${GAME_REWARDS.map(g=>{
      const locked=total<g.threshold;
      const state=locked?'locked':avail>0?'ready':'empty';
      const bg=state==='ready'?'#F0FDF4':state==='empty'?'#FFFBEB':'#F9FAFB';
      const border=state==='ready'?'#86EFAC':state==='empty'?'#FCD34D':'#E5E7EB';
      const nameColor=state==='ready'?'#15803D':state==='empty'?'#92400E':'#9CA3AF';
      return `<div style="background:${bg};border:2px solid ${border};border-radius:16px;padding:18px;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:${state==='ready'?'14px':'0'}">
          <span style="font-size:48px;opacity:${locked?'.4':'1'}">${g.icon}</span>

            <div style="font-weight:900;font-size:18px;color:${nameColor}">${g.name}</div>
            <div style="font-size:12px;color:var(--text-muted);font-weight:600;margin-top:3px">
              ${locked?`🔒 Потрібно ${g.desc} · Зараз: ${total}/${g.threshold}`:
                state==='ready'?`✅ Доступно: <strong>${timeStr}</strong>`:
                `⏰ Час вичерпано · ще ${needForNext} правильних`}
            </div>
          </div>
        </div>
        ${state==='ready'?`<button class="btn btn-block" style="background:${g.color};color:white;font-size:17px;font-weight:900;padding:16px;border:none;border-radius:12px;cursor:pointer;font-family:inherit" data-action="playGame" data-game="${g.id}" data-minutes="${avail}">▶ Грати ${timeStr}!</button>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

function startTetrisGame(totalSec){
  const canvas=document.getElementById('tetris-canvas'); if(!canvas) return;
  const COLS=10,ROWS=20;
  const csW=Math.floor((window.innerWidth-16)/COLS);
  const csH=Math.floor((window.innerHeight-120)/ROWS);
  const CSIZE=Math.max(16,Math.min(csW,csH,30));
  canvas.width=COLS*CSIZE; canvas.height=ROWS*CSIZE;
  const ctx=canvas.getContext('2d');
  const COLORS=['','#EF4444','#F97316','#EAB308','#22C55E','#06B6D4','#6366F1','#EC4899'];
  const SHAPES=[[[1,1,1,1]],[[2,2],[2,2]],[[0,3,0],[3,3,3]],[[0,4,4],[4,4,0]],[[5,5,0],[0,5,5]],[[6,0,0],[6,6,6]],[[0,0,7],[7,7,7]]];
  let board=Array.from({length:ROWS},()=>new Array(COLS).fill(0));
  let score=0,linesCleared=0,cur=null,cx=0,cy=0,dead=false,timeLeft=totalSec,timeUsed=0,rafId=null,timerInt=null;
  const scoreEl=document.getElementById('tetris-score');
  const timerEl=document.getElementById('tetris-timer');

  function newPiece(){
    const sh=SHAPES[Math.floor(Math.random()*SHAPES.length)].map(r=>[...r]);
    cur=sh; cx=Math.floor((COLS-sh[0].length)/2); cy=0;
    if(hit(0,0,cur)){dead=true; endGame();}
  }
  function hit(dx,dy,p){
    for(let r=0;r<p.length;r++) for(let c=0;c<p[r].length;c++)
      if(p[r][c]){const nx=cx+c+dx,ny=cy+r+dy; if(nx<0||nx>=COLS||ny>=ROWS) return true; if(ny>=0&&board[ny][nx]) return true;}
    return false;
  }
  function place(){
    for(let r=0;r<cur.length;r++) for(let c=0;c<cur[r].length;c++)
      if(cur[r][c]&&cy+r>=0) board[cy+r][cx+c]=cur[r][c];
    let cleared=0;
    for(let r=ROWS-1;r>=0;r--) if(board[r].every(v=>v)){board.splice(r,1);board.unshift(new Array(COLS).fill(0));cleared++;r++;}
    score+=[0,100,300,500,800][cleared]||0; linesCleared+=cleared;
    if(scoreEl) scoreEl.textContent=score+' очк.';
    newPiece();
  }
  function rot(p){const rows=p.length,cols=p[0].length;return Array.from({length:cols},(_,c)=>Array.from({length:rows},(_,r)=>p[rows-1-r][c]));}
  function drawCell(x,y,col){
    ctx.fillStyle=col; ctx.fillRect(x*CSIZE+1,y*CSIZE+1,CSIZE-2,CSIZE-2);
    ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fillRect(x*CSIZE+1,y*CSIZE+1,CSIZE-2,4);
  }
  function draw(){
    ctx.fillStyle='#111'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1;
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) ctx.strokeRect(c*CSIZE,r*CSIZE,CSIZE,CSIZE);
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(board[r][c]) drawCell(c,r,COLORS[board[r][c]]);
    if(cur) for(let r=0;r<cur.length;r++) for(let c=0;c<cur[r].length;c++) if(cur[r][c]) drawCell(cx+c,cy+r,COLORS[cur[r][c]]);
    if(dead){
      ctx.fillStyle='rgba(0,0,0,.75)'; ctx.fillRect(0,canvas.height/2-36,canvas.width,72);
      ctx.fillStyle='white'; ctx.font=`bold ${CSIZE}px Nunito,sans-serif`; ctx.textAlign='center';
      ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-10);
      ctx.fillText('Очки: '+score,canvas.width/2,canvas.height/2+20);
    }
  }
  let lastDrop=0;
  function loop(ts){
    if(dead) return;
    const speed=Math.max(80,600-linesCleared*8);
    if(ts-lastDrop>speed){
      if(!hit(0,1,cur)) cy++; else place();
      lastDrop=ts;
    }
    draw(); rafId=requestAnimationFrame(loop);
  }
  function endGame(){
    dead=true; if(rafId) cancelAnimationFrame(rafId); if(timerInt) clearInterval(timerInt); draw();
  }
  timerInt=setInterval(()=>{
    if(dead)return;
    timeLeft--;timeUsed++;saveGameTime('tetris',1);
    const m=Math.floor(timeLeft/60),s=timeLeft%60;
    if(timerEl) timerEl.textContent=`⏱ ${m}:${s<10?'0':''}${s}`;
    if(timeLeft<=0) endGame();
  },1000);
  function onKey(e){
    if(dead) return;
    if(e.key==='ArrowLeft'&&!hit(-1,0,cur)) cx--;
    else if(e.key==='ArrowRight'&&!hit(1,0,cur)) cx++;
    else if(e.key==='ArrowDown'){if(!hit(0,1,cur))cy++;else place();}
    else if(e.key==='ArrowUp'){const r=rot(cur);if(!hit(0,0,r))cur=r;}
    else if(e.key===' '){while(!hit(0,1,cur))cy++;place();}
  }
  document.addEventListener('keydown',onKey);
  let tx0=0,ty0=0,tt0=0;
  canvas.addEventListener('touchstart',e=>{e.preventDefault();tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;tt0=Date.now();},{passive:false});
  canvas.addEventListener('touchend',e=>{
    if(dead) return;
    const dx=e.changedTouches[0].clientX-tx0,dy=e.changedTouches[0].clientY-ty0,dt=Date.now()-tt0;
    if(Math.hypot(dx,dy)<12&&dt<220){const r=rot(cur);if(!hit(0,0,r))cur=r;}
    else if(Math.abs(dx)>Math.abs(dy)){if(dx<-15&&!hit(-1,0,cur))cx--;else if(dx>15&&!hit(1,0,cur))cx++;}
    else if(dy>15){while(!hit(0,1,cur))cy++;place();}
  },{passive:false});
  window._tetrisCleanup=()=>{dead=true;if(rafId)cancelAnimationFrame(rafId);if(timerInt)clearInterval(timerInt);document.removeEventListener('keydown',onKey);};
  newPiece(); requestAnimationFrame(loop);
}

function startMarioGame(totalSec){
  const canvas=document.getElementById('mario-canvas');if(!canvas)return;
  const W=canvas.offsetWidth||Math.min(420,window.innerWidth-16);
  const H=Math.min(Math.round(W*1.05),440);
  canvas.width=W;canvas.height=H;
  // NEW NES-STYLE MARIO WITH MUSHROOMS + SUPER MARIO + PRE-BUILT LEVEL
  const ctx=canvas.getContext('2d');
  const T=32;
  const GY=H-T*2;
  let score=0,lives=3,timeLeft=totalSec,timeUsed=0,rafId=null,timerInt=null,over=false,frame=0;
  const timerEl=document.getElementById('mario-timer'),scoreEl=document.getElementById('mario-score');
  const GRAV=0.6,JUMP=-15,WALK=3.5;
  let cam=0;
  let marioSuper=false;
  const MH_SMALL=32,MH_SUPER=60;
  let M={x:T*2,y:GY-MH_SMALL,w:22,h:MH_SMALL,vx:0,vy:0,onGround:false,dir:1,dying:0,invT:0,wf:0};
  const keys={L:false,R:false};
  let blocks=[],goombas=[],mushrooms=[],coins=[],coinAnims=[],worldRight=0;

  function B(tx,rb,type){
    const bw=(type==='PP'||type==='PT')?T*2:T;
    blocks.push({x:tx*T,y:GY-(rb+1)*T,w:bw,h:T,type,s:'n',bt:0});
  }
  function G(tx){
    goombas.push({x:tx*T+4,y:GY-T,w:T-4,h:T,vx:-1.2,vy:0,dead:false,ft:0,wf:0});
  }
  function C(tx,rb){
    coins.push({x:tx*T+T/2,y:GY-(rb+0.5)*T,collected:false,t:0});
  }

  function buildLevel(){
    G(4);
    B(6,3,'Q');B(7,3,'B');B(8,3,'Q');B(9,3,'B');B(10,3,'Q');B(8,5,'Q');
    C(6,4);C(9,4);
    G(12);G(13);
    B(16,0,'PP');B(16,1,'PT');
    G(18);G(19);
    B(22,3,'B');B(23,3,'Q');B(24,3,'B');B(25,3,'Q');B(26,3,'B');B(24,5,'Q');
    C(23,4);C(25,4);
    G(27);
    B(30,0,'PP');B(30,1,'PP');B(30,2,'PT');
    G(32);G(33);G(34);
    B(36,5,'Q');B(37,5,'B');B(38,5,'B');B(39,5,'Q');B(40,5,'B');B(41,5,'Q');B(38,7,'Q');
    C(36,6);C(39,6);C(41,6);
    G(42);G(43);
    for(let i=0;i<4;i++) for(let j=0;j<=i;j++) B(44+i,j,'S');
    for(let i=0;i<4;i++) for(let j=0;j<4-i;j++) B(50+i,j,'S');
    B(56,0,'PP');B(56,1,'PP');B(56,2,'PP');B(56,3,'PT');
    G(58);G(59);G(60);G(61);
    B(62,4,'Q');B(64,4,'B');B(65,4,'Q');
    C(62,5);C(65,5);
    G(67);
    for(let i=0;i<5;i++) for(let j=0;j<=i;j++) B(70+i,j,'S');
    B(78,0,'PP');B(78,1,'PT');
    G(80);G(81);G(82);
    B(84,3,'Q');B(85,3,'Q');B(86,3,'Q');B(87,3,'Q');B(88,3,'Q');B(89,3,'Q');
    C(84,4);C(85,4);C(86,4);C(87,4);C(88,4);
    B(86,5,'B');B(87,5,'Q');B(88,5,'B');
    G(90);G(91);
    for(let i=0;i<8;i++) for(let j=0;j<=i;j++) B(92+i,j,'S');
    worldRight=101*T;
  }
  buildLevel();

  // Section generators for infinite play
  const SECTS=[
    x=>{ // Block row with coins
      const rb=3+Math.floor(Math.random()*2);
      for(let i=0;i<5;i++) B(x+i,rb,i%2?'B':'Q');
      for(let i=1;i<4;i++) C(x+i,rb+1);
      G(x-1);G(x+5);
      return x+7;
    },
    x=>{ // Pipe
      const h=2+Math.floor(Math.random()*3);
      for(let i=0;i<h-1;i++) B(x,i,'PP');
      B(x,h-1,'PT');
      G(x-1);G(x+2);
      return x+5;
    },
    x=>{ // Double platform
      B(x,3,'Q');B(x+1,3,'B');B(x+2,3,'Q');
      B(x+1,5,'Q');
      C(x,4);C(x+2,4);
      G(x-1);G(x+3);
      return x+5;
    },
    x=>{ // Ascending stairs
      for(let i=0;i<5;i++) for(let j=0;j<=i;j++) B(x+i,j,'S');
      G(x-1);G(x+5);
      return x+6;
    },
    x=>{ // Descending stairs
      for(let i=0;i<5;i++) for(let j=0;j<5-i;j++) B(x+i,j,'S');
      G(x-1);G(x+5);
      return x+6;
    },
    x=>{ // Coin arc
      [3,4,5,5,4,3].forEach((rb,i)=>C(x+i,rb));
      G(x-1);G(x+6);
      return x+8;
    },
    x=>{ // Two pipes close
      B(x,0,'PP');B(x,1,'PT');
      B(x+4,0,'PP');B(x+4,1,'PP');B(x+4,2,'PT');
      G(x+2);G(x+6);
      return x+8;
    },
    x=>{ // High Q row
      for(let i=0;i<4;i++) B(x+i,6,'Q');
      C(x,7);C(x+1,7);C(x+2,7);C(x+3,7);
      G(x-1);G(x+4);
      return x+6;
    },
  ];

  function genWorld(toX){
    while(worldRight<toX){
      const tx=Math.floor(worldRight/T)+2;
      const nxt=SECTS[Math.floor(Math.random()*SECTS.length)](tx);
      worldRight=(nxt+1+Math.floor(Math.random()*3))*T;
    }
  }
  genWorld(W*5);

  function tryJump(){if(over||M.dying>0)return;if(M.onGround){M.vy=JUMP;M.onGround=false;}}
  function onKey(e){
    const d=e.type==='keydown';
    if(e.key==='ArrowLeft')keys.L=d;
    if(e.key==='ArrowRight')keys.R=d;
    if((e.key==='ArrowUp'||e.key===' ')&&d){e.preventDefault();tryJump();}
  }
  document.addEventListener('keydown',onKey);document.addEventListener('keyup',onKey);
  function setupBtn(id,s,e){
    const b=document.getElementById(id);if(!b)return;
    b.addEventListener('touchstart',ev=>{ev.preventDefault();s();},{passive:false});
    b.addEventListener('touchend',ev=>{ev.preventDefault();if(e)e();},{passive:false});
    b.addEventListener('mousedown',s);b.addEventListener('mouseup',()=>{if(e)e();});
  }
  setupBtn('btn-left',()=>keys.L=true,()=>keys.L=false);
  setupBtn('btn-right',()=>keys.R=true,()=>keys.R=false);
  setupBtn('btn-jump',tryJump,null);

  function aabb(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

  function hitBlock(b){
    if(b.type==='Q'&&b.s==='n'){
      b.s='h';b.bt=14;
      if(!marioSuper){
        mushrooms.push({x:b.x+T/2-8,y:b.y-T,vx:1.5,vy:0,collected:false,slideT:12});
      } else {
        score+=100;if(scoreEl)scoreEl.textContent=score+' очк.';
        coinAnims.push({x:b.x+T/2,y:b.y,vy:-5,alpha:1.0});
      }
    } else if(b.type==='B'&&marioSuper){
      b.s='br';score+=50;if(scoreEl)scoreEl.textContent=score+' очк.';
    }
  }

  function dieMario(){
    if(M.dying>0)return;
    if(marioSuper){
      marioSuper=false;M.h=MH_SMALL;M.y+=(MH_SUPER-MH_SMALL);M.invT=90;return;
    }
    M.dying=70;M.vy=-12;M.vx=0;
  }

  function update(){
    if(over)return;
    frame++;
    genWorld(M.x+W*4);
    if(M.invT>0)M.invT--;
    if(M.dying>0){
      M.dying--;M.vy+=GRAV;M.y+=M.vy;
      if(M.dying<=0){
        lives--;if(lives<=0){over=true;return;}
        marioSuper=false;
        M={x:cam+T*2,y:GY-MH_SMALL,w:22,h:MH_SMALL,vx:0,vy:0,onGround:false,dir:1,dying:0,invT:100,wf:0};
      }
      return;
    }
    if(keys.L){M.vx=-WALK;M.dir=-1;}
    else if(keys.R){M.vx=WALK;M.dir=1;}
    else M.vx*=0.65;
    M.vy+=GRAV;M.x+=M.vx;M.y+=M.vy;
    if(Math.abs(M.vx)>0.3)M.wf++;
    M.onGround=false;
    if(M.x<cam)M.x=cam;
    if(M.y+M.h>=GY){M.y=GY-M.h;M.vy=0;M.onGround=true;}
    for(const b of blocks){
      if(b.s==='br')continue;
      if(!aabb(M.x,M.y,M.w,M.h,b.x,b.y,b.w,b.h))continue;
      const olap_b=b.y+b.h-M.y,olap_t=M.y+M.h-b.y;
      const olap_r=b.x+b.w-M.x,olap_l=M.x+M.w-b.x;
      const minV=Math.min(olap_b,olap_t),minH=Math.min(olap_r,olap_l);
      if(minH<minV){
        if(olap_l<olap_r){M.x=b.x-M.w;M.vx=0;}
        else{M.x=b.x+b.w;M.vx=0;}
      } else {
        if(olap_t<olap_b){M.y=b.y-M.h;M.vy=0;M.onGround=true;}
        else{M.y=b.y+b.h;M.vy=0;hitBlock(b);}
      }
    }
    if(M.y>H+80&&M.dying<=0)dieMario();
    coins.forEach(co=>{
      if(co.collected)return;
      co.t++;
      if(aabb(M.x,M.y,M.w,M.h,co.x-9,co.y-9,18,18)){
        co.collected=true;score+=50;if(scoreEl)scoreEl.textContent=score+' очк.';
        coinAnims.push({x:co.x,y:co.y,vy:-5,alpha:1.0});
      }
    });
    mushrooms.forEach(mu=>{
      if(mu.collected)return;
      if(mu.slideT>0){mu.slideT--;return;}
      mu.vy+=GRAV;mu.x+=mu.vx;mu.y+=mu.vy;
      if(mu.y+T>=GY){mu.y=GY-T;mu.vy=0;}
      for(const b of blocks){
        if(b.s==='br')continue;
        if(aabb(mu.x,mu.y,16,T,b.x,b.y,b.w,b.h)){mu.vx*=-1;break;}
      }
      if(aabb(M.x,M.y,M.w,M.h,mu.x,mu.y,16,T)){
        mu.collected=true;score+=1000;if(scoreEl)scoreEl.textContent=score+' очк.';
        if(!marioSuper){marioSuper=true;M.h=MH_SUPER;M.y-=(MH_SUPER-MH_SMALL);}
      }
    });
    coinAnims.forEach(c=>{c.y+=c.vy;c.vy+=0.22;c.alpha-=0.02;});
    coinAnims=coinAnims.filter(c=>c.alpha>0);
    goombas.forEach(g=>{
      if(g.ft>0){g.ft--;return;}
      if(g.dead)return;
      g.x+=g.vx;g.wf++;
      if(g.y+g.h<GY)g.vy+=GRAV,g.y+=g.vy;
      else{g.vy=0;g.y=GY-g.h;}
      for(const b of blocks){
        if(b.s==='br')continue;
        if(aabb(g.x,g.y,g.w,g.h,b.x,b.y,b.w,b.h)){g.vx*=-1;break;}
      }
      if(!aabb(M.x,M.y,M.w,M.h,g.x,g.y,g.w,g.h)||M.invT>0)return;
      if(M.vy>0&&M.y+M.h<=g.y+14){
        g.dead=true;g.ft=40;M.vy=-9;score+=200;if(scoreEl)scoreEl.textContent=score+' очк.';
      } else if(M.dying<=0&&M.invT<=0){dieMario();}
    });
    blocks.forEach(b=>{if(b.bt>0)b.bt--;});
    cam=Math.max(0,M.x-W*0.35);
  }

  function drawGround(){
    const tx0=Math.floor(cam/T)-1,tx1=tx0+Math.ceil(W/T)+2;
    for(let tx=tx0;tx<=tx1;tx++){
      const px=tx*T-cam;
      ctx.fillStyle='#0DA22D';ctx.fillRect(px,GY,T,7);
      ctx.fillStyle='#8B5E3C';ctx.fillRect(px,GY+7,T,H-GY-7);
      ctx.strokeStyle='#7A5234';ctx.lineWidth=1;
      ctx.strokeRect(px,GY+7,T,T);
      if(tx%2===0)ctx.strokeRect(px+T/2,GY+7+T,T,T);
    }
  }

  function drawBlock(b){
    const px=b.x-cam;
    if(px+b.w<-T||px>W+T||b.s==='br')return;
    const bOff=b.bt>0?-Math.sin(b.bt/14*Math.PI)*6:0;
    const py=b.y+bOff;
    if(b.type==='Q'){
      ctx.fillStyle=b.s==='h'?'#887700':'#E4A000';
      ctx.fillRect(px,py,T,T);
      ctx.fillStyle=b.s==='h'?'#665500':'#C48000';
      ctx.fillRect(px,py,T,3);ctx.fillRect(px,py,3,T);
      ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(px+1,py+1,T-4,4);
      if(b.s==='n'){ctx.fillStyle='white';ctx.font=`bold ${T*0.6}px monospace`;ctx.textAlign='center';ctx.fillText('?',px+T/2,py+T*0.76);}
    } else if(b.type==='B'||b.type==='S'){
      ctx.fillStyle='#C84B11';ctx.fillRect(px,py,T,T);
      ctx.fillStyle='#9B390D';
      ctx.fillRect(px,py+T/2-1,T,2);ctx.fillRect(px+T/2,py,2,T/2-1);
      ctx.fillRect(px+T/4,py+T/2+1,2,T/2-1);
      ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(px,py,T,3);
    } else if(b.type==='PT'){
      ctx.fillStyle='#00A800';ctx.fillRect(px-3,py,b.w+6,T);
      ctx.fillStyle='#007700';ctx.fillRect(px+1,py+4,b.w-2,T-4);
      ctx.fillStyle='#00CC00';ctx.fillRect(px-2,py,4,T);
    } else if(b.type==='PP'){
      ctx.fillStyle='#00A800';ctx.fillRect(px,py,b.w,T);
      ctx.fillStyle='#007700';ctx.fillRect(px+3,py,b.w-6,T);
      ctx.fillStyle='#00CC00';ctx.fillRect(px+2,py,4,T);
    }
  }

  function drawCoin(co){
    if(co.collected)return;
    const px=co.x-cam,py=co.y+Math.sin(co.t*0.12)*3;
    if(px<-20||px>W+20)return;
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(px,py,9,0,6.28);ctx.fill();
    ctx.fillStyle='#FFF176';ctx.beginPath();ctx.arc(px-2,py-2,4,0,6.28);ctx.fill();
    ctx.strokeStyle='#CC9900';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(px,py,9,0,6.28);ctx.stroke();
  }

  function drawMushroom(mu){
    if(mu.collected)return;
    const px=mu.x-cam,py=mu.y;
    if(px+16<0||px>W)return;
    ctx.fillStyle='#FCA474';ctx.fillRect(px+2,py+10,12,10);
    ctx.fillStyle='#CC2222';
    ctx.beginPath();ctx.arc(px+8,py+10,10,Math.PI,0);ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath();ctx.arc(px+4,py+7,4,0,6.28);ctx.fill();
    ctx.beginPath();ctx.arc(px+12,py+6,3,0,6.28);ctx.fill();
  }

  function drawGoomba(g){
    if(g.dead&&g.ft<=0)return;
    const px=g.x-cam;if(px+g.w<0||px>W)return;
    if(g.ft>0){
      ctx.fillStyle='#C84B11';ctx.fillRect(px,g.y+g.h-6,g.w,6);
      ctx.fillStyle='white';ctx.fillRect(px+3,g.y+g.h-5,5,4);ctx.fillRect(px+g.w-8,g.y+g.h-5,5,4);
      return;
    }
    ctx.fillStyle='#C84B11';
    ctx.beginPath();ctx.arc(px+g.w/2,g.y+g.h*0.5,g.w*0.46,0,6.28);ctx.fill();
    ctx.fillStyle='white';
    ctx.fillRect(px+3,g.y+g.h*0.18,7,7);ctx.fillRect(px+g.w-10,g.y+g.h*0.18,7,7);
    ctx.fillStyle='#111';
    ctx.fillRect(px+4,g.y+g.h*0.18+1,5,5);ctx.fillRect(px+g.w-9,g.y+g.h*0.18+1,5,5);
    ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(px+2,g.y+g.h*0.12);ctx.lineTo(px+11,g.y+g.h*0.2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(px+g.w-3,g.y+g.h*0.12);ctx.lineTo(px+g.w-12,g.y+g.h*0.2);ctx.stroke();
    const fw=g.wf%18<9?2:0;
    ctx.fillStyle='#5C3317';
    ctx.fillRect(px+2,g.y+g.h-7,10,7+fw);ctx.fillRect(px+g.w-12,g.y+g.h-7,10,7+(fw?0:3));
  }

  function drawMario(){
    if(M.invT>0&&frame%4<2)return;
    const px=M.x-cam,py=M.y,d=M.dir;
    const la=M.onGround&&Math.abs(M.vx)>0.5?Math.floor(M.wf/6)%2:0;
    if(marioSuper){
      ctx.fillStyle='#CC2222';ctx.fillRect(px+4,py,14,6);ctx.fillRect(px+7,py-6,9,6);
      ctx.fillStyle='#6B3B1F';ctx.fillRect(px,py+6,22,6);
      ctx.fillStyle='#FCA474';ctx.fillRect(px+3,py+6,16,10);
      ctx.fillStyle='#111';ctx.fillRect(d>0?px+15:px+3,py+10,4,4);
      ctx.fillStyle='#FCA474';ctx.fillRect(d>0?px+17:px+1,py+12,4,3);
      ctx.fillStyle='#6B3B1F';ctx.fillRect(px+2,py+14,18,4);
      ctx.fillStyle='#CC2222';ctx.fillRect(px+1,py+20,20,14);
      ctx.fillStyle='#2244CC';ctx.fillRect(px+5,py+20,12,6);
      ctx.fillStyle='#2244CC';ctx.fillRect(px,py+34,22,14);
      ctx.fillStyle='#CC2222';ctx.fillRect(px+4,py+20,3,6);ctx.fillRect(px+15,py+20,3,6);
      ctx.fillStyle='#2244CC';
      ctx.fillRect(px+1,py+48,9,6+(la?2:0));ctx.fillRect(px+12,py+48,9,6+(la?0:2));
      ctx.fillStyle='#5C3317';
      ctx.fillRect(px-1,py+54+(la?2:0),12,6);ctx.fillRect(px+11,py+54+(la?0:2),12,6);
    } else {
      ctx.fillStyle='#CC2222';ctx.fillRect(px+4,py,14,5);ctx.fillRect(px+7,py-5,9,5);
      ctx.fillStyle='#6B3B1F';ctx.fillRect(px,py+5,22,5);
      ctx.fillStyle='#FCA474';ctx.fillRect(px+3,py+5,16,9);
      ctx.fillStyle='#111';ctx.fillRect(d>0?px+15:px+3,py+8,4,4);
      ctx.fillStyle='#FCA474';ctx.fillRect(d>0?px+17:px+1,py+10,4,3);
      ctx.fillStyle='#6B3B1F';ctx.fillRect(px+2,py+12,18,4);
      ctx.fillStyle='#CC2222';ctx.fillRect(px+2,py+16,18,6);
      ctx.fillStyle='#2244CC';ctx.fillRect(px+5,py+16,12,5);
      ctx.fillStyle='#2244CC';ctx.fillRect(px,py+22,22,10);
      ctx.fillStyle='#CC2222';ctx.fillRect(px+4,py+16,3,5);ctx.fillRect(px+15,py+16,3,5);
      ctx.fillStyle='#2244CC';
      ctx.fillRect(px+1,py+32,9,6+(la?2:0));ctx.fillRect(px+12,py+32,9,6+(la?0:2));
      ctx.fillStyle='#5C3317';
      ctx.fillRect(px-1,py+38+(la?2:0),12,4);ctx.fillRect(px+11,py+38+(la?0:2),12,4);
    }
  }

  function draw(){
    ctx.fillStyle='#5C94FC';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,255,255,.9)';
    for(let i=0;i<6;i++){
      const cx=((i*190+60)-cam*0.18)%(W+220)-110,cy=28+i*16;
      ctx.beginPath();ctx.arc(cx,cy,24,0,6.28);ctx.arc(cx+30,cy-15,18,0,6.28);ctx.arc(cx+60,cy,22,0,6.28);ctx.fill();
    }
    drawGround();
    blocks.forEach(drawBlock);
    coins.forEach(drawCoin);
    mushrooms.forEach(drawMushroom);
    coinAnims.forEach(c=>{
      ctx.globalAlpha=c.alpha;
      ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(c.x-cam,c.y,9,0,6.28);ctx.fill();
      ctx.fillStyle='#FFF176';ctx.beginPath();ctx.arc(c.x-cam-2,c.y-2,4,0,6.28);ctx.fill();
      ctx.globalAlpha=1;
    });
    goombas.forEach(drawGoomba);
    if(M.dying<=0)drawMario();
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(4,4,lives*24+10,26);
    for(let i=0;i<lives;i++){ctx.fillStyle='#EF4444';ctx.font='bold 14px Nunito,sans-serif';ctx.textAlign='left';ctx.fillText('♥',8+i*24,22);}
    if(marioSuper){ctx.fillStyle='rgba(255,220,0,0.9)';ctx.font='bold 13px Nunito,sans-serif';ctx.textAlign='left';ctx.fillText('★ SUPER',8,42);}
    if(over){
      ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,H/2-44,W,88);
      ctx.fillStyle='#FF4444';ctx.font='bold 26px Nunito,sans-serif';ctx.textAlign='center';
      ctx.fillText('💥 GAME OVER',W/2,H/2-10);
      ctx.fillStyle='white';ctx.font='bold 17px Nunito,sans-serif';
      ctx.fillText('Очки: '+score,W/2,H/2+20);
    }
  }

  function loop(){update();draw();if(!over)rafId=requestAnimationFrame(loop);}
  timerInt=setInterval(()=>{
    if(over)return;
    timeLeft--;timeUsed++;saveGameTime('mario',1);
    const m=Math.floor(timeLeft/60),s=timeLeft%60;
    if(timerEl)timerEl.textContent=`⏱ ${m}:${s<10?'0':''}${s}`;
    if(timeLeft<=0){
      over=true;if(rafId)cancelAnimationFrame(rafId);draw();
      ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,H/2-44,W,88);
      ctx.fillStyle='#FFD700';ctx.font='bold 24px Nunito,sans-serif';ctx.textAlign='center';
      ctx.fillText('⏰ Час вийшов!',W/2,H/2-10);
      ctx.fillStyle='white';ctx.font='17px Nunito,sans-serif';
      ctx.fillText('Очки: '+score,W/2,H/2+20);
    }
  },1000);
  window._marioCleanup=()=>{
    if(rafId)cancelAnimationFrame(rafId);if(timerInt)clearInterval(timerInt);
    document.removeEventListener('keydown',onKey);document.removeEventListener('keyup',onKey);
  };
  loop();
}

function startTanksGame(totalSec){
  const canvas=document.getElementById('tanks-canvas');if(!canvas)return;
  const W=canvas.offsetWidth||window.innerWidth;
  const H=window.innerHeight-50;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const T=32,COLS=Math.floor(W/T),ROWS=Math.floor(H/T);
  let score=0,lives=3,timeLeft=totalSec,timeUsed=0,rafId=null,timerInt=null,over=false,frame=0;
  const timerEl=document.getElementById('tanks-timer'),scoreEl=document.getElementById('tanks-score');
  const DIRS=[{dx:0,dy:-1},{dx:1,dy:0},{dx:0,dy:1},{dx:-1,dy:0}];
  let grid=Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},(_,c)=>{
    if(r===0||r===ROWS-1||c===0||c===COLS-1)return 2;
    if(r>1&&r<ROWS-2&&c>1&&c<COLS-2&&Math.random()<0.18)return 1;
    return 0;
  }));
  const mx=Math.floor(COLS/2),my=ROWS-3;
  for(let r=ROWS-4;r<ROWS;r++)for(let c=mx-2;c<=mx+1;c++)if(r>=0&&c>=0&&r<ROWS&&c<COLS)grid[r][c]=0;
  const SPEED=2.2;
  let P={x:mx*T,y:my*T,w:T-4,h:T-4,dir:0,reload:0};
  let bullets=[],enemies=[],spawnT=80;
  const keys={U:false,D:false,L:false,R:false};
  function onKey(e){
    const d=e.type==='keydown';
    if(e.key==='ArrowUp'){keys.U=d;e.preventDefault();}
    if(e.key==='ArrowDown'){keys.D=d;e.preventDefault();}
    if(e.key==='ArrowLeft'){keys.L=d;e.preventDefault();}
    if(e.key==='ArrowRight'){keys.R=d;e.preventDefault();}
    if(e.key===' '&&d){fire(P,'p');e.preventDefault();}
  }
  document.addEventListener('keydown',onKey);document.addEventListener('keyup',onKey);
  function setupBtn(id,s,e){
    const b=document.getElementById(id);if(!b)return;
    b.addEventListener('touchstart',ev=>{ev.preventDefault();s();},{passive:false});
    b.addEventListener('touchend',ev=>{ev.preventDefault();if(e)e();},{passive:false});
    b.addEventListener('mousedown',s);b.addEventListener('mouseup',()=>{if(e)e();});
  }
  setupBtn('btn-up',()=>keys.U=true,()=>keys.U=false);
  setupBtn('btn-down',()=>keys.D=true,()=>keys.D=false);
  setupBtn('btn-left',()=>keys.L=true,()=>keys.L=false);
  setupBtn('btn-right',()=>keys.R=true,()=>keys.R=false);
  setupBtn('btn-fire',()=>fire(P,'p'),null);
  function aabb(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
  function fire(tank,owner){
    if(tank.reload>0)return;
    const d=DIRS[tank.dir];
    bullets.push({x:tank.x+tank.w/2-4,y:tank.y+tank.h/2-4,w:8,h:8,vx:d.dx*9,vy:d.dy*9,owner});
    tank.reload=28;
  }
  function tryMove(t,dx,dy){
    const nx=t.x+dx,ny=t.y+dy;
    const c0=Math.floor(nx/T),r0=Math.floor(ny/T);
    const c1=Math.floor((nx+t.w-1)/T),r1=Math.floor((ny+t.h-1)/T);
    if(c0<0||c1>=COLS||r0<0||r1>=ROWS)return false;
    if(grid[r0][c0]||grid[r0][c1]||grid[r1][c0]||grid[r1][c1])return false;
    t.x=nx;t.y=ny;return true;
  }
  function spawnEnemy(){
    const spts=[[1,1],[Math.floor(COLS/2)-1,1],[COLS-3,1]];
    const sp=spts[Math.floor(Math.random()*spts.length)];
    if(!grid[sp[1]]||grid[sp[1]][sp[0]]!==0)return;
    enemies.push({x:sp[0]*T,y:sp[1]*T,w:T-4,h:T-4,dir:2,reload:0,moveT:40,shoot:90+Math.floor(Math.random()*60)});
  }
  function update(){
    if(over)return;frame++;
    if(P.reload>0)P.reload--;
    spawnT--;if(spawnT<=0&&enemies.length<4){spawnEnemy();spawnT=150+Math.random()*100;}
    if(keys.U){P.dir=0;tryMove(P,0,-SPEED);}
    else if(keys.D){P.dir=2;tryMove(P,0,SPEED);}
    else if(keys.L){P.dir=3;tryMove(P,-SPEED,0);}
    else if(keys.R){P.dir=1;tryMove(P,SPEED,0);}
    enemies.forEach(e=>{
      if(e.reload>0)e.reload--;
      e.moveT--;
      if(e.moveT<=0){
        if(Math.random()<0.35){const ddx=P.x-e.x,ddy=P.y-e.y;e.dir=Math.abs(ddx)>Math.abs(ddy)?(ddx>0?1:3):(ddy>0?2:0);}
        else e.dir=Math.floor(Math.random()*4);
        e.moveT=25+Math.floor(Math.random()*70);
      }
      const ed=DIRS[e.dir];if(!tryMove(e,ed.dx*1.6,ed.dy*1.6)){e.dir=Math.floor(Math.random()*4);e.moveT=20;}
      e.shoot--;if(e.shoot<=0){fire(e,'e');e.shoot=80+Math.floor(Math.random()*80);}
    });
    const btr=new Set(),etr=new Set();
    bullets.forEach((b,bi)=>{
      b.x+=b.vx;b.y+=b.vy;
      if(b.x<0||b.x>=W||b.y<0||b.y>=H){btr.add(bi);return;}
      const tc=Math.floor((b.x+4)/T),tr=Math.floor((b.y+4)/T);
      if(tr>=0&&tr<ROWS&&tc>=0&&tc<COLS&&grid[tr][tc]){if(grid[tr][tc]===1)grid[tr][tc]=0;btr.add(bi);return;}
      if(b.owner==='e'&&aabb(b.x,b.y,b.w,b.h,P.x,P.y,P.w,P.h)){
        lives--;if(lives<=0)over=true;P.x=mx*T;P.y=my*T;P.dir=0;P.reload=0;btr.add(bi);return;
      }
      if(b.owner==='p'){enemies.forEach((en,ei)=>{
        if(!btr.has(bi)&&aabb(b.x,b.y,b.w,b.h,en.x,en.y,en.w,en.h)){etr.add(ei);btr.add(bi);score+=200;if(scoreEl)scoreEl.textContent=score+' очк.';}
      });}
    });
    bullets=bullets.filter((_,i)=>!btr.has(i));enemies=enemies.filter((_,i)=>!etr.has(i));
  }
  function drawTank(t,color,dark){
    const{x,y,w,h,dir}=t;
    ctx.fillStyle=color;ctx.fillRect(x,y,w,h);
    ctx.fillStyle=dark;
    if(dir===0||dir===2){ctx.fillRect(x,y,5,h);ctx.fillRect(x+w-5,y,5,h);}
    else{ctx.fillRect(x,y,w,5);ctx.fillRect(x,y+h-5,w,5);}
    ctx.fillStyle=color;ctx.fillRect(x+w/2-5,y+h/2-5,10,10);
    const dd=DIRS[dir];ctx.fillStyle=dark;ctx.fillRect(x+w/2-3+dd.dx*7,y+h/2-3+dd.dy*7,6+Math.abs(dd.dx)*10,6+Math.abs(dd.dy)*10);
  }
  function draw(){
    ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const x=c*T,y=r*T;
      if(grid[r][c]===1){
        ctx.fillStyle='#C84B11';ctx.fillRect(x+1,y+1,T-2,T-2);
        ctx.fillStyle='#8B3900';ctx.fillRect(x+1,y+T/2-1,T-2,2);ctx.fillRect(x+T/2,y+1,2,T/2-2);
      }else if(grid[r][c]===2){
        ctx.fillStyle='#777';ctx.fillRect(x+1,y+1,T-2,T-2);
        ctx.fillStyle='#999';ctx.fillRect(x+1,y+1,T-2,4);ctx.fillRect(x+1,y+1,4,T-2);
      }
    }
    ctx.fillStyle='#FFD700';bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));
    enemies.forEach(e=>drawTank(e,'#DC2626','#7f1d1d'));
    drawTank(P,'#22C55E','#14532d');
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(4,4,lives*24+10,26);
    for(let i=0;i<lives;i++){ctx.fillStyle='#22C55E';ctx.font='bold 14px Nunito,sans-serif';ctx.textAlign='left';ctx.fillText('🛡',8+i*24,22);}
    if(over){
      ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,H/2-44,W,88);
      ctx.fillStyle='#FF4444';ctx.font='bold 26px Nunito,sans-serif';ctx.textAlign='center';ctx.fillText('💥 GAME OVER',W/2,H/2-10);
      ctx.fillStyle='white';ctx.font='bold 17px Nunito,sans-serif';ctx.fillText('Знищено: '+Math.floor(score/200),W/2,H/2+20);
    }
  }
  function loop(){update();draw();if(!over)rafId=requestAnimationFrame(loop);}
  timerInt=setInterval(()=>{
    if(over)return;timeLeft--;timeUsed++;saveGameTime('tanks',1);
    const m=Math.floor(timeLeft/60),s=timeLeft%60;
    if(timerEl)timerEl.textContent=`⏱ ${m}:${s<10?'0':''}${s}`;
    if(timeLeft<=0){
      over=true;if(rafId)cancelAnimationFrame(rafId);draw();
      ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,H/2-44,W,88);
      ctx.fillStyle='#FFD700';ctx.font='bold 24px Nunito,sans-serif';ctx.textAlign='center';ctx.fillText('⏰ Час вийшов!',W/2,H/2-10);
      ctx.fillStyle='white';ctx.font='17px Nunito,sans-serif';ctx.fillText('Знищено: '+Math.floor(score/200),W/2,H/2+20);
    }
  },1000);
  window._tanksCleanup=()=>{
    if(rafId)cancelAnimationFrame(rafId);if(timerInt)clearInterval(timerInt);
    document.removeEventListener('keydown',onKey);document.removeEventListener('keyup',onKey);
  };
  loop();
}

function startCarsGame(totalSec){
  const canvas=document.getElementById('cars-canvas');if(!canvas)return;
  const W=canvas.offsetWidth||window.innerWidth;
  const H=window.innerHeight-50;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const ROAD_W=Math.min(W*0.68,220),ROAD_X=(W-Math.min(W*0.68,220))/2;
  const LW=ROAD_W/3;
  const LANES=[ROAD_X+LW/2,ROAD_X+LW*1.5,ROAD_X+LW*2.5];
  let score=0,lives=3,timeLeft=totalSec,timeUsed=0,rafId=null,timerInt=null,over=false,frame=0;
  const timerEl=document.getElementById('cars-timer'),scoreEl=document.getElementById('cars-score');
  let plLane=1,plX=LANES[1],plTargX=LANES[1],plY=H-90;
  let crashed=false,crashT=0,speed=3.5;
  let cars=[],roadOff=0,spawnT=60;
  const CARCOLORS=['#EF4444','#F97316','#EAB308','#22C55E','#EC4899','#8B5CF6','#06B6D4','#F43F5E'];
  function moveLane(d){if(over||crashed)return;plLane=Math.max(0,Math.min(2,plLane+d));plTargX=LANES[plLane];}
  function onKey(e){
    if(e.type==='keydown'){
      if(e.key==='ArrowLeft'){moveLane(-1);e.preventDefault();}
      if(e.key==='ArrowRight'){moveLane(1);e.preventDefault();}
    }
  }
  document.addEventListener('keydown',onKey);
  function setupBtn(id,fn){
    const b=document.getElementById(id);if(!b)return;
    b.addEventListener('touchstart',ev=>{ev.preventDefault();fn();},{passive:false});
    b.addEventListener('click',fn);
  }
  setupBtn('btn-left',()=>moveLane(-1));
  setupBtn('btn-right',()=>moveLane(1));
  function drawCar(x,y,color,ply){
    const cw=30,ch=50;
    ctx.fillStyle=color;ctx.fillRect(x-cw/2,y-ch/2,cw,ch);
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(x-cw/2+4,y-ch/4,cw-8,ch/2);
    ctx.fillStyle='rgba(200,240,255,.8)';
    ctx.fillRect(x-cw/2+5,y-ch/2+5,cw-10,ch*0.28);ctx.fillRect(x-cw/2+5,y+ch*0.1,cw-10,ch*0.22);
    ctx.fillStyle=ply?'#FFFFF0':'#FFFFC0';
    ctx.fillRect(x-cw/2+2,y-ch/2,7,4);ctx.fillRect(x+cw/2-9,y-ch/2,7,4);
    ctx.fillStyle='#111';
    ctx.fillRect(x-cw/2-2,y-ch/2+4,4,10);ctx.fillRect(x+cw/2-2,y-ch/2+4,4,10);
    ctx.fillRect(x-cw/2-2,y+ch/2-14,4,10);ctx.fillRect(x+cw/2-2,y+ch/2-14,4,10);
    if(ply){ctx.fillStyle='rgba(255,255,255,.75)';ctx.beginPath();ctx.moveTo(x,y-22);ctx.lineTo(x-9,y-10);ctx.lineTo(x+9,y-10);ctx.closePath();ctx.fill();}
  }
  function update(){
    if(over)return;frame++;
    if(crashed){crashT--;if(crashT<=0){crashed=false;plLane=1;plX=LANES[1];plTargX=LANES[1];}return;}
    speed=3.5+frame/900;score=Math.floor(frame*speed/60);if(scoreEl)scoreEl.textContent=score+' м';
    plX+=(plTargX-plX)*0.22;
    spawnT--;if(spawnT<=0){
      const ln=Math.floor(Math.random()*3);
      if(cars.filter(c=>c.lane===ln&&c.y<H/2).length<2)
        cars.push({x:LANES[ln],y:-60,lane:ln,color:CARCOLORS[Math.floor(Math.random()*CARCOLORS.length)]});
      spawnT=Math.max(28,75-Math.floor(frame/250));
    }
    cars.forEach(c=>c.y+=speed+2);cars=cars.filter(c=>c.y<H+80);
    roadOff=(roadOff+speed)%80;
    for(const c of cars){
      if(Math.abs(c.x-plX)<24&&Math.abs(c.y-plY)<44){
        lives--;crashed=true;crashT=85;c.y=H+200;if(lives<=0)over=true;break;
      }
    }
  }
  function draw(){
    ctx.fillStyle='#2d5a27';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#555';ctx.fillRect(ROAD_X,0,ROAD_W,H);
    ctx.fillStyle='#FFD700';ctx.fillRect(ROAD_X,0,5,H);ctx.fillRect(ROAD_X+ROAD_W-5,0,5,H);
    ctx.fillStyle='rgba(255,255,255,.7)';
    for(let i=0;i<2;i++){const lx=ROAD_X+LW*(i+1);for(let j=0;j<16;j++)ctx.fillRect(lx-2,(j*80-roadOff+H*2)%H-4,4,40);}
    cars.forEach(c=>drawCar(c.x,c.y,c.color,false));
    if(!crashed||frame%6<4)drawCar(plX,plY,'#2244EE',true);
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(4,4,lives*24+10,26);
    for(let i=0;i<lives;i++){ctx.fillStyle='#EF4444';ctx.font='bold 14px Nunito,sans-serif';ctx.textAlign='left';ctx.fillText('♥',8+i*24,22);}
    if(over){
      ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,H/2-44,W,88);
      ctx.fillStyle='#FF4444';ctx.font='bold 26px Nunito,sans-serif';ctx.textAlign='center';ctx.fillText('💥 Аварія!',W/2,H/2-10);
      ctx.fillStyle='white';ctx.font='bold 17px Nunito,sans-serif';ctx.fillText('Пройдено: '+score+' м',W/2,H/2+20);
    }
  }
  function loop(){update();draw();if(!over)rafId=requestAnimationFrame(loop);}
  timerInt=setInterval(()=>{
    if(over)return;timeLeft--;timeUsed++;saveGameTime('cars',1);
    const m=Math.floor(timeLeft/60),s=timeLeft%60;
    if(timerEl)timerEl.textContent=`⏱ ${m}:${s<10?'0':''}${s}`;
    if(timeLeft<=0){
      over=true;if(rafId)cancelAnimationFrame(rafId);draw();
      ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,H/2-44,W,88);
      ctx.fillStyle='#FFD700';ctx.font='bold 24px Nunito,sans-serif';ctx.textAlign='center';ctx.fillText('⏰ Час вийшов!',W/2,H/2-10);
      ctx.fillStyle='white';ctx.font='17px Nunito,sans-serif';ctx.fillText('Пройдено: '+score+' м',W/2,H/2+20);
    }
  },1000);
  window._carsCleanup=()=>{if(rafId)cancelAnimationFrame(rafId);if(timerInt)clearInterval(timerInt);document.removeEventListener('keydown',onKey);};
  loop();
}

if(window.speechSynthesis){
  const loadVoices=()=>{ _voices=speechSynthesis.getVoices(); };

function speak(text){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.82; u.pitch=1;
  if(isPl()){
    u.lang='pl-PL';
    const prefPl=['Zosia','Krzysztof','Microsoft Paulina Online','Microsoft Paulina'];
    const byName=_voices.find(v=>prefPl.includes(v.name));
    const byLang=_voices.find(v=>v.lang==='pl-PL')||_voices.find(v=>v.lang.startsWith('pl'));
    u.voice=byName||byLang||null;
  } else {
    u.lang='en-US';
    const pref=['Samantha','Karen','Moira','Fiona','Daniel','Alex'];
    const byName=_voices.find(v=>pref.includes(v.name)&&v.lang.startsWith('en'));
    const byLocal=_voices.find(v=>v.lang==='en-US'&&v.localService);
    const byLang=_voices.find(v=>v.lang==='en-US')||_voices.find(v=>v.lang.startsWith('en'));
    u.voice=byName||byLocal||byLang||null;
  }
  speechSynthesis.speak(u);
}
const hasSpeechRec = !!(window.SpeechRecognition||window.webkitSpeechRecognition);
let _activeRec = null;
function levenshtein(a,b){
  const m=a.length,n=b.length,dp=[];
  for(let i=0;i<=m;i++){dp[i]=[i];for(let j=1;j<=n;j++)dp[i][j]=i?0:j;}
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function wordsMatch(said,expected){
  const norm=s=>s.toLowerCase().replace(/[.,!?;:'"()-]/g,'').replace(/\b(the|a|an)\b/gi,'').replace(/\s+/g,' ').trim();
  const s=norm(said),e=norm(expected);
  if(!s||!e) return false;
  if(s===e) return true;
  const maxDist=l=>l>=9?2:l>=5?1:0;
  const sw=s.split(' '),ew=e.split(' ');
  if(sw.length===ew.length)
    return sw.every((w,i)=>levenshtein(w,ew[i])<=maxDist(Math.max(w.length,ew[i].length)));
  return levenshtein(s,e)<=maxDist(Math.max(s.length,e.length));
}

  return dir==='ua-en' ? (isPl()?'pl-PL':'en-US') : 'uk';

function recLangLabel(dir){
