      if(s.direction==='en-ua'){
        s.isFlipped=true;
        const fc=document.querySelector('.flashcard');
        if(fc){ fc.style.transition='none'; fc.classList.add('flipped'); setTimeout(()=>{ if(fc) fc.style.transition=''; },50); }
        const btns=document.querySelector('.study-btns');
        if(btns){
          btns.innerHTML=`<div style="background:#F0FDF4;border:2px solid #86EFAC;border-radius:12px;padding:12px 14px;text-align:center;color:#166534;font-weight:700;font-size:13px">Правильна відповідь:<span style="font-size:20px;font-weight:900;display:block;margin-top:6px;color:#15803D">${esc(w.ukrainian)}</span></div><div style="text-align:center;font-size:13px;color:var(--text-muted);font-weight:700;margin-top:2px">Ти правильно сказав це слово?</div><div class="study-btns-row"><button class="study-btn btn-know" data-action="know">✅ Так, правильно!</button><button class="study-btn btn-unknown" data-action="unknown">❌ Ні, помилився</button></div><button class="study-btn btn-list2 ${w.listed?'active':''}" id="list2-btn" data-action="toggleList2">${w.listed?'✅ В Список 2':'📋 До Списку 2'}</button><button class="study-btn btn-quit" data-action="quitStudy">⏹ Завершити заняття</button>`;
          attachEvents();
        }
        return;
      }
      const SRec=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(!SRec){ showToast('⚠️ Потрібен Chrome для голосової перевірки'); return; }
      const expected=w.english;
      const btn=document.getElementById('rec-btn');
      const lang=recLangCode(s.direction);
      const langLabel=recLangLabel(s.direction);
      const resetBtn=()=>{ _activeRec=null; if(btn){ btn.innerHTML='🎤 Натисни і скажи переклад'; btn.style.background='linear-gradient(135deg,#6366F1,#4F46E5)'; btn.disabled=false; } };
      // Push-to-talk: якщо вже пишемо — зупиняємо
      if(_activeRec){ _activeRec.stop(); return; }
      if(btn){ btn.innerHTML=`🔴 Говорю ${langLabel}... (натисни ще раз щоб зупинити)`; btn.style.background='linear-gradient(135deg,#DC2626,#991B1B)'; btn.disabled=false; }
      const rec=new SRec();
      _activeRec=rec;
      rec.lang=lang; rec.interimResults=false; rec.maxAlternatives=5;
      let gotResult=false;
      rec.onresult=ev=>{
        gotResult=true; _activeRec=null;
        const alts=[...ev.results[0]].map(r=>r.transcript.trim());
        const matchIdx=alts.findIndex(t=>wordsMatch(t,expected));
        const heard=alts[0];
        if(matchIdx>=0){
          const matched=alts[matchIdx];
          const heardTxt=matchIdx===0?`"${heard}"`:`"${heard}" (зрозумів: "${matched}")`;
          showToast(`✅ Правильно! Почув: ${heardTxt}`,2500);
          setTimeout(()=>actionKnow(),500);
        } else {
          showToast(`❌ Почув: "${heard}" · Правильно: "${expected}"`,4000);
          resetBtn();
        }
      };
      rec.onerror=ev=>{
        gotResult=true;
        const msgs={'not-allowed':'🚫 Дозволь доступ до мікрофону!','no-speech':'🔇 Нічого не почув, говори голосніше!','audio-capture':'🎤 Мікрофон не знайдено','network':'🌐 Помилка мережі','language-not-supported':`⚠️ Мова "${lang}" не підтримується цим браузером`};
        showToast(msgs[ev.error]||`⚠️ Помилка: ${ev.error||'невідома'}`,3500);
        resetBtn();
      };
      rec.onend=()=>{ if(!gotResult){ showToast('🔇 Нічого не почув. Спробуй ще раз!',2500); } resetBtn(); };
      try{ rec.start(); }catch(e){ showToast('⚠️ Помилка мікрофону. Дозволь доступ!'); resetBtn(); }
    },
    toggleList2: ()=>{
      e.stopPropagation();
      const w=currentCard(); if(!w) return;
      w.listed=!w.listed;
      const l2btn=document.getElementById('list2-btn');
      if(l2btn){ l2btn.textContent=w.listed?'✅ В Список 2':'📋 До Списку 2'; l2btn.classList.toggle('active',!!w.listed); }
      saveData(); schedulePush();
      showToast(w.listed?'📋 Додано до Списку 2!':'📋 Видалено зі Списку 2');
    },
    startList2: ()=>{ const p=getProfile(); if(!p) return; const ids=p.words.filter(w=>w.listed).map(w=>w.id); if(!ids.length){ showToast('📋 Список 2 порожній!'); return; } startSession(ids,S.params.direction||'en-ua'); },
    clearList2: ()=>{ const p=getProfile(); if(!p) return; p.words.forEach(w=>{ delete w.listed; }); saveData(); schedulePush(); showToast('📋 Список 2 очищено'); render(); },
    addColors:  ()=>{
      const p=getProfile(); if(!p) return;
      const CW=[['red','червоний'],['blue','синій'],['green','зелений'],['yellow','жовтий'],['orange','помаранчевий'],['purple','фіолетовий'],['pink','рожевий'],['white','білий'],['black','чорний'],['brown','коричневий'],['gray','сірий'],['light blue','блакитний']];
      let added=0;
      CW.forEach(([en,ua])=>{ if(!p.words.some(w=>w.english===en)){ p.words.push({id:uid(),english:en,ukrainian:ua,addedDate:today(),timesStudied:0,timesKnown:0,timesUnknown:0,category:'learning',streak:0}); added++; } });
      saveData(); showToast(added>0?`🎨 Додано ${added} кольорів`:'🎨 Кольори вже є'); render();
    },
    resumeSession: ()=>{ if(resumeSavedSession()) go('study'); else { clearSavedSession(); render(); } },
    discardSession: ()=>{ clearSavedSession(); render(); },
    quitStudy: ()=>{ if(S.session&&S.session.completed.length>0&&!confirm('Завершити заняття достроково?')) return; clearSavedSession(); S.session=null; go('menu'); },
    studyAgain:()=> go('studySetup'),
  };
  const fn=actions[action]; if(fn) fn();
}

function handleKey(e){
  if(e.key==='Enter'&&(S.view==='addWord'||S.view==='editWord')&&e.target.tagName!=='TEXTAREA'){ const btn=document.querySelector('[data-action="saveWord"],[data-action="updateWord"]'); if(btn) btn.click(); }
  if(e.key==='ArrowLeft'&&S.view==='study') actionKnow();
  if(e.key==='ArrowRight'&&S.view==='study') actionUnknown();
  if(e.key===' '&&S.view==='study'){ e.preventDefault(); actionFlip(); }
}

// ── TOAST ──
function showToast(msg,dur=3000){
  const cont=document.getElementById('toast-container'); if(!cont) return;
  const el=document.createElement('div'); el.className='toast'; el.textContent=msg;
  cont.appendChild(el); setTimeout(()=>el.remove(),dur);
}

// ── CONFETTI ──
function launchConfetti(intensity=1){
  const canvas=document.getElementById('confetti-canvas'); if(!canvas) return;
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const colors=['#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF','#FF8B94','#B19CD9','#FECA57','#48DBFB'];
  const pieces=Array.from({length:Math.round(120*intensity)},()=>({
    x:Math.random()*canvas.width, y:-20-Math.random()*100,
    w:Math.random()*12+6, h:Math.random()*8+4,
    c:colors[Math.floor(Math.random()*colors.length)],
    vx:(Math.random()-.5)*4, vy:Math.random()*3+2,
    angle:Math.random()*360, spin:(Math.random()-.5)*6,
  }));
  let frame;
  const draw=()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height); let any=false;
    pieces.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.angle+=p.spin; p.vy+=.05; if(p.y<canvas.height+20) any=true;
      ctx.save(); ctx.translate(p.x+p.w/2,p.y+p.h/2); ctx.rotate(p.angle*Math.PI/180); ctx.fillStyle=p.c; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
    });
    if(any) frame=requestAnimationFrame(draw); else ctx.clearRect(0,0,canvas.width,canvas.height);
  };
  draw();
  setTimeout(()=>{ cancelAnimationFrame(frame); ctx.clearRect(0,0,canvas.width,canvas.height); },6000);
}

// ── KID FX ──
function showBossSpeech(phrase){
  const bar=document.querySelector('.boss-bar'); if(!bar) return;
  document.querySelectorAll('.boss-bubble').forEach(e=>e.remove());
  const el=document.createElement('div'); el.className='boss-bubble'; el.textContent=phrase;
  bar.insertBefore(el,bar.firstChild);
  setTimeout(()=>el&&el.remove(),2200);
}
function showCombo(n){
  document.querySelectorAll('.combo-flash').forEach(e=>e.remove());
  const el=document.createElement('div'); el.className='combo-flash';
  el.textContent=`🔥 COMBO x${n}!`;
  document.body.appendChild(el);
  setTimeout(()=>el&&el.remove(),1300);
}
function showSparkles(x,y){
  const em=['⭐','✨','💫','🌟','⚡','💥'];
  for(let i=0;i<6;i++){
    const el=document.createElement('div'); el.className='sparkle';
    el.textContent=em[Math.floor(Math.random()*em.length)];
    el.style.left=x+'px'; el.style.top=y+'px';
    const a=Math.random()*Math.PI*2, d=55+Math.random()*90;
    el.style.setProperty('--tx',Math.cos(a)*d+'px');
    el.style.setProperty('--ty',(Math.sin(a)*d-40)+'px');
    el.style.animationDelay=(i*.07)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el&&el.remove(),1100);
  }
}
function showFloatReaction(emoji,x,y){
  const el=document.createElement('div'); el.className='float-reaction';
  el.textContent=emoji; el.style.left=x+'px'; el.style.top=y+'px';
  document.body.appendChild(el);
  setTimeout(()=>el&&el.remove(),1200);
}

// ── ANIMAL RUNNER ──
const ANIMALS=['🐔','🐷','🐄','🐑','🐸','🦆','🐇','🦔','🦊','🐺','🐯','🦁','🐘','🦒','🦓','🐊','🦕','🐢','🐍','🦖','🐉','🦋','🐝','🐛','🦗','🦟','🐠','🦀','🦞','🦑'];
let _animalTimer=null;
function scheduleAnimal(){
  clearTimeout(_animalTimer);
  _animalTimer=setTimeout(doAnimalRun,8000+Math.random()*17000);
}
function doAnimalRun(){
  if(!isKid()||['tetris','mario','tanks','cars'].includes(S.view)){ scheduleAnimal(); return; }
  const trackId=pick(['animal-runner','animal-runner','animal-runner2','animal-runner3']);
  const el=document.getElementById(trackId); if(!el){ scheduleAnimal(); return; }
  const vw=window.innerWidth, rtl=Math.random()>.5, dur=1400+Math.random()*2200;
  el.textContent=pick(ANIMALS);
  el.style.transition='none';
  el.style.left=(rtl?vw+80:-80)+'px';
  el.style.transform=rtl?'scaleX(-1)':'scaleX(1)';
  el.getBoundingClientRect();
  el.style.transition=`left ${dur}ms linear`;
  el.style.left=(rtl?-80:vw+80)+'px';
  _animalTimer=setTimeout(()=>{ el.style.transition='none'; scheduleAnimal(); },dur+200);
}

// ── KID RUNNER (рандомна поява) ──
let _runnerTimer=null;
function scheduleRunner(firstTime=false){
  clearTimeout(_runnerTimer);
  // Перший раз: 5-12с, далі: 8-55с між пробіжками
  const delay=firstTime ? 5000+Math.random()*7000 : 8000+Math.random()*47000;
  _runnerTimer=setTimeout(doRun,delay);
}
function doRun(){
  if(!isKid()||['tetris','mario','tanks','cars'].includes(S.view)){ scheduleRunner(); return; }
  const el=document.getElementById('kid-runner');
  if(!el){ scheduleRunner(); return; }
  const vw=window.innerWidth;
  const rtl=Math.random()>.65; // 35% шанс — справа наліво
  const dur=3000+Math.random()*4000; // 3-7с на перетин
  el.style.transition='none';
  el.style.left=(rtl?vw+90:-90)+'px';
  el.style.transform=rtl?'scaleX(-1)':'scaleX(1)';
  el.getBoundingClientRect(); // force reflow
  el.style.transition=`left ${dur}ms linear`;
  el.style.left=(rtl?-90:vw+90)+'px';
  _runnerTimer=setTimeout(()=>{ el.style.transition='none'; scheduleRunner(); },dur+200);
}

// ── INIT ──
document.addEventListener('click', handleClick);
document.addEventListener('keydown', handleKey);
render();
loadData();
scheduleRunner(true); // перша поява через 5-12с
scheduleAnimal(); // тварини пробігають раз на 15-50с
</script>
